version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bitewise-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: BiteWiseDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  ml-service:
    build:
      context: ./ML_service
      dockerfile: Dockerfile
    container_name: bitewise-ml
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: bitewise-backend
    env_file:
      - ./Backend/.env
    ports:
      - "5138:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=BiteWiseDb;Username=postgres;Password=mysecretpassword
      - MLService__BaseUrl=http://ml-service:8000
    depends_on:
      - db
      - ml-service
    restart: unless-stopped

volumes:
  postgres_data:
